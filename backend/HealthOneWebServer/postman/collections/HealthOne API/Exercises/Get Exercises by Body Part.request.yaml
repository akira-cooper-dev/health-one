$kind: http-request
name: Get Exercises by Body Part
description: Get a paginated list of exercises filtered by body part.
method: POST
url: '{{baseUrl}}/api/v1/bodyparts/{{bodyPartName}}/exercises'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "Offset": 0,
      "Limit": 10
    }
