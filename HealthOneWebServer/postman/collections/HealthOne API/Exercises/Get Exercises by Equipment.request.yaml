$kind: http-request
name: Get Exercises by Equipment
description: Get a paginated list of exercises filtered by equipment type.
method: POST
url: '{{baseUrl}}/api/v1/equipments/{{equipmentName}}/exercises'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "Offset": 0,
      "Limit": 10
    }
