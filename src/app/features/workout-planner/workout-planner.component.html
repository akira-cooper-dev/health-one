<div>
  <mat-toolbar class="search-block mat-elevation-z4">
    <mat-toolbar-row>
      <mat-form-field class="search-field" appearance="outline">
        <input
          type="text"
          matInput
          placeholder="Search"
          (keydown.enter)="sendSearchRequest($event)"
        />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </mat-toolbar-row>
  </mat-toolbar>
  <div class="search-results">
    <mat-card class="card" appearance="outlined">
      <mat-card-header>
        <mat-card-title>test</mat-card-title>
        <mat-card-subtitle>test</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content> </mat-card-content>
      <mat-card-actions>
        <button mat-button>test</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
